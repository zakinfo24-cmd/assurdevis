<title>AssurDevis — Devis Assurance Auto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green-900: #0D2E1E;
  --green-800: #143a28;
  --green-700: #1A553F;
  --green-600: #1D6B4D;
  --green-400: #2E9E72;
  --green-200: #8ECFB5;
  --green-100: #C3E8D8;
  --green-50:  #EAF6EF;
  --green-flag: #006233;
  --bdx-900: #4A0A1A;
  --bdx-800: #6B1226;
  --bdx-700: #8A1538;
  --bdx-600: #A81D44;
  --bdx-400: #C94B6D;
  --bdx-100: #F0D6DE;
  --bdx-50:  #FAF0F3;
  --gold:      #C9952A;
  --gold-dark: #A87A1E;
  --gold-light:#F5D78E;
  --cream:     #F7F2E8;
  --cream-dark:#EDE8DB;
  --sand:      #D9D3C2;
  --white:     #FFFFFF;
  --text:      #0D1411;
  --text-mid:  #3D4F46;
  --text-soft: #7A8C85;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 22px;
  --radius-xl: 32px;
  --shadow-sm: 0 2px 8px rgba(74,10,26,0.08);
  --shadow-md: 0 8px 32px rgba(74,10,26,0.12);
  --shadow-btn: 0 5px 0 #5E0E1F, 0 6px 10px rgba(0,0,0,0.28);
  --ff-display: 'Syne', sans-serif;
  --ff-body:   'DM Sans', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--cream);
  font-family: var(--ff-body);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  display: flex;
  align-items: center;
  justify-content: center;
}
@media (max-width: 720px) {
  html, body { align-items: flex-start; height: 100%; }
}
#app {
  width: 100%;
  max-width: 720px;
  height: 85vh;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  background: var(--white);
  overflow: hidden;
  box-shadow: var(--shadow-md);
  border-radius: var(--radius-lg);
}
.chat-header {
  background: linear-gradient(135deg, var(--bdx-800), var(--bdx-700) 60%, var(--bdx-600));
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.header-avatar {
  width: 62px; height: 62px; border-radius: 50%;
  background: rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--ff-display);
  font-size: 24px; font-weight: 800;
  color: var(--gold);
  flex-shrink: 0;
}
.header-info { flex: 1; }
.header-name {
  font-family: var(--ff-display);
  font-size: 16.1px; font-weight: 700;
  color: var(--white);
}
.header-status {
  font-size: 13.2px;
  display: flex; align-items: center; gap: 5px;
  margin-top: 1px;
  color: rgba(255,255,255,0.7);
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-200); }
.info-tiles {
  padding: 8px 24px;
  display: flex; flex-wrap: wrap;
  gap: 6px;
  background: var(--bdx-50);
  border-bottom: 1px solid rgba(74,10,26,0.08);
  min-height: 0;
}
.info-tiles:empty { padding: 0 24px; }
.tile {
  display: flex; align-items: center; gap: 7px;
  background: var(--white);
  border: 1px solid var(--bdx-100);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  font-size: 13.2px;
  white-space: nowrap;
  animation: tileIn .3s ease;
}
@keyframes tileIn { from{opacity:0;transform:scale(.9)} to{opacity:1;transform:scale(1)} }
.tile-icon { font-size: 14.9px; }
.tile-content { display: flex; flex-direction: column; }
.tile-value { font-weight: 600; color: var(--bdx-700); line-height: 1.2; }
.tile-label { font-size: 10.3px; color: var(--text-soft); text-transform: uppercase; letter-spacing: .4px; }
.chat-messages {
  flex: 1; overflow-y: auto; padding: 20px 24px;
  display: flex; flex-direction: column;
  gap: 8px;
  scroll-behavior: smooth;
  background: var(--cream);
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 4px; }
.msg-row { display: flex; gap: 10px; align-items: flex-end; max-width: 82%; }
.msg-row.bot { align-self: flex-start; }
.msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
.msg-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--ff-display); font-size: 12.6px; font-weight: 700;
}
.msg-row.bot .msg-avatar { background: var(--bdx-100); color: var(--bdx-700); }
.msg-row.user .msg-avatar { background: var(--bdx-600); color: var(--gold); }
.bubble {
  padding: 9px 15px; border-radius: var(--radius-md);
  font-size: 15.5px; line-height: 1.55;
  max-width: 100%;
  word-wrap: break-word;
}
.msg-row.bot .bubble {
  background: var(--white);
  border: 1px solid var(--sand);
  border-bottom-left-radius: 4px;
  color: var(--text);
  box-shadow: var(--shadow-sm);
}
.msg-row.user .bubble {
  background: linear-gradient(135deg, var(--bdx-600), var(--bdx-700));
  color: #fff;
  border-bottom-right-radius: 4px;
}
.typing-row { display: flex; gap: 10px; align-items: flex-end; align-self: flex-start; }
.typing-bubble {
  background: var(--white); border: 1px solid var(--sand);
  border-radius: var(--radius-md); border-bottom-left-radius: 4px;
  padding: 12px 16px;
  display: flex; gap: 4px; align-items: center;
  box-shadow: var(--shadow-sm);
}
.typing-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text-soft);
  animation: pulse 1.3s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: .15s; }
.typing-dot:nth-child(3) { animation-delay: .3s; }
@keyframes pulse { 0%,80%,100%{opacity:.2;transform:scale(.9)} 40%{opacity:1;transform:scale(1)} }
.choices-row {
  display: flex; flex-wrap: wrap; gap: 5px;
  padding-left: 46px; max-width: 82%;
}
.choice-btn {
  background: var(--white); border: 1px solid var(--sand);
  color: var(--text-mid); padding: 8px 16px;
  border-radius: 100px; cursor: pointer;
  font-size: 14.4px; font-weight: 500;
  transition: all .15s;
  white-space: nowrap;
}
.choice-btn:hover { background: var(--bdx-600); color: #fff; border-color: var(--bdx-600); }
.choice-btn:disabled { opacity: .4; pointer-events: none; }
.devis-card {
  background: var(--white);
  border: 1px solid var(--sand);
  border-top: 3px solid var(--gold);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  align-self: flex-start;
  max-width: 88%;
  margin-left: 40px;
  box-shadow: var(--shadow-sm);
  animation: fadeIn .4s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.devis-header {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 1px solid var(--sand);
}
.devis-icon {
  width: 32px; height: 32px; border-radius: var(--radius-sm);
  background: var(--gold-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 18.4px;
}
.devis-title-text {
  font-family: var(--ff-display);
  font-size: 14.9px; font-weight: 700;
  color: var(--bdx-800);
}
.devis-lines { display: flex; flex-direction: column; gap: 0; }
.devis-line {
  display: flex; justify-content: space-between; align-items: center;
  padding: 5px 0;
  border-bottom: 1px solid var(--sand);
  font-size: 14.4px;
}
.devis-line:last-of-type { border-bottom: none; }
.line-label { color: var(--text-soft); }
.line-val { font-weight: 500; color: var(--text); }
.devis-total-block {
  margin-top: 8px;
  background: linear-gradient(135deg, var(--bdx-700), var(--bdx-800));
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.total-label {
  font-family: var(--ff-display);
  font-size: 12.6px; font-weight: 700;
  color: rgba(255,255,255,.7);
  letter-spacing: .5px; text-transform: uppercase;
}
.total-amount {
  font-family: var(--ff-display);
  font-size: 23px; font-weight: 800;
  color: var(--gold);
}
.devis-promo {
  margin-top: 6px; padding: 6px 10px;
  background: var(--gold-light);
  border: 1px solid var(--gold);
  border-radius: var(--radius-sm);
  font-size: 13.8px; color: #7a5e00; font-weight: 500;
  display: flex; align-items: flex-start; gap: 6px;
}
.devis-rating { margin-top: 8px; padding: 8px 10px; background: var(--cream); border-radius: var(--radius-sm); display: flex; align-items: center; gap: 8px; font-size: 13px; }
.devis-rating .stars { display: flex; gap: 2px; }
.devis-rating .star { font-size: 20px; cursor: pointer; color: var(--sand); transition: color .15s, transform .15s; }
.devis-rating .star:hover { transform: scale(1.2); }
.devis-rating .star.filled { color: var(--gold); }
.devis-rating .star.half { position: relative; display: inline-block; color: var(--sand); }
.devis-rating .star.half::before { content: '\2605'; position: absolute; left: 0; width: 50%; overflow: hidden; color: var(--gold); }
.devis-rating .star.readonly { cursor: default; }
.devis-rating .star.readonly:hover { transform: none; }
.devis-rating .avg-label { font-weight: 600; color: var(--text-mid); margin-left: 4px; }
.devis-rating .rated-msg { font-size: 12px; color: var(--green-600); font-weight: 500; }
.input-bar {
  padding: 14px 24px;
  background: var(--white);
  border-top: 1px solid var(--sand);
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.chat-input {
  flex: 1;
  background: var(--cream);
  border: 1px solid var(--sand);
  border-radius: var(--radius-lg);
  padding: 10px 18px;
  font-size: 15.5px;
  font-family: var(--ff-body);
  color: var(--text);
  outline: none;
  transition: border-color .2s;
}
.chat-input:focus { border-color: var(--green-400); }
.chat-input::placeholder { color: var(--text-soft); }
.chat-input:disabled { opacity: .5; cursor: not-allowed; }
.nouveau-bar {
  background: var(--bdx-700);
  padding: 6px 16px 8px;
  display: flex;

<script>
// ══════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════
const API_BASE = '';

// ══════════════════════════════════════════════
//  ÉTAT
// ══════════════════════════════════════════════
let conversationId = '';
let isProcessing   = false;
let isCollecting   = false;
let devisFields    = {};

// ══════════════════════════════════════════════
//  AFFICHAGE MESSAGES
// ══════════════════════════════════════════════
function addMessage(text, role, isHTML = false) {
  const chat   = document.getElementById('chat');
  const row    = document.createElement('div');
  row.className = `msg-row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'bot' ? 'AD' : 'U';
  row.appendChild(avatar);

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (isHTML) { bubble.innerHTML = text; }
  else        { bubble.textContent = text; }
  row.appendChild(bubble);

  if (role === 'bot') {
    const cleanText = isHTML ? text.replace(/<[^>]*>/g,'').replace(/\*\*/g,'') : text;
    const speakBtn  = document.createElement('button');
    speakBtn.className   = 'speak-btn';
    speakBtn.textContent = '🔊';
    speakBtn.title       = 'Écouter';
    speakBtn.onclick     = () => speakText(cleanText, speakBtn);
    bubble.appendChild(speakBtn);
  }

  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

// Bulle bot avec streaming (texte ajouté progressivement)
function addStreamingBubble() {
  const chat   = document.getElementById('chat');
  const row    = document.createElement('div');
  row.className = 'msg-row bot';
  row.id        = 'streaming-row';

  const avatar = document.createElement('div');
  avatar.className   = 'msg-avatar';
  avatar.textContent = 'AD';
  row.appendChild(avatar);

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.id        = 'streaming-bubble';
  row.appendChild(bubble);

  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function finalizeStreamingBubble(fullText) {
  const bubble = document.getElementById('streaming-bubble');
  const row    = document.getElementById('streaming-row');
  if (!bubble || !row) return;

  // Ajouter bouton TTS
  const speakBtn = document.createElement('button');
  speakBtn.className   = 'speak-btn';
  speakBtn.textContent = '🔊';
  speakBtn.title       = 'Écouter';
  speakBtn.onclick     = () => speakText(fullText, speakBtn);
  bubble.appendChild(speakBtn);

  // Retirer les IDs temporaires
  bubble.removeAttribute('id');
  row.removeAttribute('id');
}

function addTyping() {
  const chat = document.getElementById('chat');
  const row  = document.createElement('div');
  row.className = 'typing-row';
  row.id        = 'typing';
  const avatar  = document.createElement('div');
  avatar.className   = 'msg-avatar';
  avatar.textContent = 'AD';
  row.appendChild(avatar);
  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

// ══════════════════════════════════════════════
//  VOIX — Web Speech API (navigateur, zéro serveur, zéro quota)
// ══════════════════════════════════════════════
let currentUtterance = null;

function cleanForSpeech(text, lang) {
  let t = text;
  t = t.replace(/#{1,6}\s*/g, '');
  t = t.replace(/\*\*(.+?)\*\*/g, '$1');
  t = t.replace(/\*(.+?)\*/g, '$1');
  t = t.replace(/__(.+?)__/g, '$1');
  t = t.replace(/_(.+?)_/g, '$1');
  t = t.replace(/`{1,3}[\s\S]*?`{1,3}/g, '');
  t = t.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');
  t = t.replace(/^\s*[-*•]\s+/gm, '');
  t = t.replace(/^\s*\d+\.\s+/gm, '');
  t = t.replace(/[|─┌┐└┘├┤┬┴┼►◄▲▼→←↑↓]/g, '');
  t = t.replace(/[{}()[\]#~`>]/g, '');
  t = t.replace(/\n{2,}/g, '. ');
  t = t.replace(/\n/g, ' ');
  t = t.replace(/\s{2,}/g, ' ');
  if (lang === 'fr') {
    t = t.replace(/\bDA\b/g, 'dinars algériens')
         .replace(/\bCV\b/g, 'chevaux')
         .replace(/\bRC\b/g, 'responsabilité civile')
         .replace(/\bTTC\b/g, 'toutes taxes comprises')
         .replace(/\bHT\b/g, 'hors taxes')
         .replace(/\bFGA\b/g, 'fonds de garantie auto')
         .replace(/\bMRH\b/g, 'multirisque habitation')
         .replace(/\bdgts\b/gi, 'dégâts');
  }
  return t.trim();
}

function detectLang(text) {
  const arabicChars = (text.match(/[\u0600-\u06FF]/g) || []).length;
  const totalChars  = text.replace(/\s/g, '').length;
  if (totalChars === 0) return 'fr';
  return (arabicChars / totalChars) > 0.25 ? 'ar' : 'fr';
}

function getBestVoice(lang) {
  const voices = window.speechSynthesis.getVoices();
  if (lang === 'ar') {
    // Priorité voix arabe : SA, MA, DZ, EG
    return voices.find(v => v.lang === 'ar-SA')
        || voices.find(v => v.lang === 'ar-MA')
        || voices.find(v => v.lang === 'ar-DZ')
        || voices.find(v => v.lang === 'ar-EG')
        || voices.find(v => v.lang.startsWith('ar'))
        || null;
  }
  // Voix françaises classées par qualité (Microsoft Neural en tête)
  const FR_PRIORITY = [
    'Microsoft Denise Online (Natural) - French (France)',
    'Microsoft Julie Online (Natural) - French (France)',
    'Microsoft Henri Online (Natural) - French (France)',
    'Google français',
    'Amélie',       // macOS
    'Thomas',       // macOS
  ];
  for (const name of FR_PRIORITY) {
    const v = voices.find(v => v.name === name);
    if (v) return v;
  }
  // Fallback : n'importe quelle voix fr-FR, fr-BE, fr-CH, puis fr-*
  return voices.find(v => v.lang === 'fr-FR')
      || voices.find(v => v.lang === 'fr-BE')
      || voices.find(v => v.lang === 'fr-CH')
      || voices.find(v => v.lang.startsWith('fr'))
      || null;
}

function speakText(text, btn) {
  // Toggle OFF si déjà en train de parler
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    if (btn) btn.classList.remove('speaking');
    return;
  }

  const lang  = detectLang(text);
  const clean = cleanForSpeech(text, lang);
  if (!clean) return;

  if (btn) btn.classList.add('speaking');

  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang  = lang === 'ar' ? 'ar-SA' : 'fr-FR';
  utter.rate  = 0.9;
  utter.pitch = 1.0;
  utter.volume = 1.0;

  const assignVoice = () => {
    const voice = getBestVoice(lang);
    if (voice) {
      utter.voice = voice;
      console.log('TTS voice:', voice.name, voice.lang);
    }
  };

  if (window.speechSynthesis.getVoices().length > 0) {
    assignVoice();
  } else {
    window.speechSynthesis.onvoiceschanged = assignVoice;
  }

  utter.onend   = () => { if (btn) btn.classList.remove('speaking'); };
  utter.onerror = (e) => { 
    console.error('TTS error:', e);
    if (btn) btn.classList.remove('speaking'); 
  };

  currentUtterance = utter;
  window.speechSynthesis.speak(utter);
}

// ══════════════════════════════════════════════
//  VOIX — STT
// ══════════════════════════════════════════════
let micRecognition = null;
let micListening   = false;
function toggleMic() {
  const btn = document.getElementById('micBtn');
  if (micListening) {
    if (micRecognition) { try { micRecognition.stop(); } catch(e){} micRecognition = null; }
    micListening = false;
    btn.classList.remove('listening');
    btn.textContent = '🎤';
    return;
  }
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    addMessage('La reconnaissance vocale n\'est pas supportée sur ce navigateur. Utilisez Chrome ou Edge.', 'bot');
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  micRecognition = new SR();
  micRecognition.lang = 'fr-FR';
  micRecognition.continuous      = false;
  micRecognition.interimResults  = false;
  micRecognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    document.getElementById('input').value = text;
    micListening = false;
    btn.classList.remove('listening');
    btn.textContent = '🎤';
    micRecognition  = null;
    setTimeout(() => sendMessage(), 300);
  };
  micRecognition.onerror = () => {
    micListening = false; btn.classList.remove('listening'); btn.textContent = '🎤'; micRecognition = null;
  };
  micRecognition.onend = () => {
    micListening = false; btn.classList.remove('listening'); btn.textContent = '🎤';
  };
  micListening = true;
  btn.classList.add('listening');
  btn.textContent = '🔴';
  try { micRecognition.start(); }
  catch(e) { micListening = false; btn.classList.remove('listening'); btn.textContent = '🎤'; }
}

// ══════════════════════════════════════════════
//  TILES PROFIL
// ══════════════════════════════════════════════
function updateTiles(items) {
  const bar = document.getElementById('tilesBar');
  bar.innerHTML = '';
  const icons = { 'Véhicule':'🚗','Wilaya':'📍','Zone':'📍','Année':'📅','Puissance':'⚡','Usage':'🛣️','Valeur':'💰','Garanties':'🛡️' };
  items.forEach(item => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.innerHTML = `<span class="tile-icon">${icons[item.key]||'📌'}</span><div class="tile-content"><div class="tile-value">${item.value}</div><div class="tile-label">${item.key}</div></div>`;
    bar.appendChild(tile);
  });
}

// Extraire les tiles depuis le texte Dify (clés détectées automatiquement)
function extractTilesFromText(text) {
  const tiles = [];
  const patterns = [
    { key:'Véhicule',  re:/(?:véhicule|voiture|moto|camion)\s*[:\-]?\s*([A-Za-zÀ-ÿ0-9\s]+?)(?:\n|,|\.|\||$)/i },
    { key:'Wilaya',    re:/(?:wilaya|région|zone)\s*[:\-]?\s*([A-Za-zÀ-ÿ\s]+?)(?:\n|,|\.|\||$)/i },
    { key:'Puissance', re:/(\d+)\s*cv/i },
    { key:'Valeur',    re:/(?:valeur|prix)\s*[:\-]?\s*([\d\s]+)\s*da/i },
    { key:'Usage',     re:/usage\s*[:\-]?\s*([A-Za-zÀ-ÿ]+)/i },
  ];
  patterns.forEach(p => {
    const m = text.match(p.re);
    if (m) tiles.push({ key: p.key, value: m[1].trim() });
  });
  return tiles;
}

// ══════════════════════════════════════════════
//  CARTE DEVIS
// ══════════════════════════════════════════════

  div.innerHTML = `

    </div>
    <div class="devis-lines">

      <div class="devis-line"><span class="line-label">TVA (19%)</span><span class="line-val">${(devis.tva||0).toLocaleString()} DA</span></div>
      <div class="devis-line"><span class="line-label">FGA (3%)</span><span class="line-val">${(devis.fga||0).toLocaleString()} DA</span></div>
      <div class="devis-line"><span class="line-label">Mensualité</span><span class="line-val">~${Math.round(v/12).toLocaleString()} DA/mois</span></div>
    </div>
    <div class="devis-total-block">
      <span class="total-label">Total TTC / an</span>
      <span class="total-amount">${v.toLocaleString()} DA</span>
    </div>
    ${devis.reduction ? `<div class="devis-promo">🏷️ Réduction: ${devis.reduction}</div>` : ''}
    <div class="devis-rating" id="rating_${devisId}">
      <span style="font-size:13px;color:var(--text-soft)">Votre avis :</span>
      <span class="stars">${[1,2,3,4,5].map(s => `<span class="star" data-stars="${s}" onclick="rateDevis('${devisId}',${s})">☆</span>`).join('')}</span>
      <span class="avg-label" id="avg_${devisId}"></span>
    </div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  calculateScore(devis).then(score => {
    if (score) {
      const scoreLine = document.createElement('div');
      scoreLine.style.cssText = 'margin-top:6px;padding:6px 10px;background:var(--green-50);border:1px solid var(--green-100);border-radius:var(--radius-sm);display:flex;align-items:center;gap:8px;font-size:13px;';
      const cls = score.overall >= 70 ? '🟢' : score.overall >= 40 ? '🟡' : '🔴';
      scoreLine.innerHTML = `${cls} Score: <strong>${score.overall}/100</strong> · Économie ${score.economy} · Couverture ${score.coverage} · Protection ${score.protection}`;
      div.insertBefore(scoreLine, div.lastElementChild);
    }
  });
  if (devisId) refreshRatingDisplay(devisId);
}

// ══════════════════════════════════════════════
//  APPEL API BACKEND LOCAL
// ══════════════════════════════════════════════
async function callBackend(msg) {
  const resp = await fetch(`${API_BASE}/chat`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg, conversation_id: conversationId }),
  });
  if (!resp.ok) throw new Error(`Backend ${resp.status}`);
  return resp.json();
}

async function callDevis(fields) {
  const resp = await fetch(`${API_BASE}/devis/auto`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: JSON.stringify(fields), conversation_id: conversationId }),
  });
  if (!resp.ok) throw new Error(`Devis ${resp.status}`);
  return resp.json();
}

async function callAnalyse(file) {
  const form = new FormData();
  form.append('file', file);
  const resp = await fetch(`${API_BASE}/analyse`, { method: 'POST', body: form });
  if (!resp.ok) throw new Error(`Analyse ${resp.status}`);
  return resp.json();
}

// ══════════════════════════════════════════════
//  ENVOI MESSAGE
// ══════════════════════════════════════════════
function sendQuick(text) {
  document.getElementById('input').value = text;
  sendMessage();
}

async function sendMessage() {
  if (isProcessing) return;
  const input = document.getElementById('input');
  const msg   = input.value.trim();
  if (!msg) return;

  input.value = '';
  addMessage(msg, 'user');

  // Si en mode collecte auto, capturer la réponse comme valeur de champ
  if (isCollecting && collecteStep < AUTO_QUESTIONS.length) {
    const key = AUTO_QUESTIONS[collecteStep].key;
    let valid = true;
    if (key === 'garanties') {
      devisFields[key] = msg.split(',').map(s => s.trim().toUpperCase());
      if (!devisFields[key].includes('RC')) {
        addMessage('RC (Responsabilité Civile) est obligatoire. Veuillez inclure RC dans vos garanties.', 'bot');
        valid = false;
      }
    } else if (key === 'duree_mois') {
      const v = parseInt(msg);
      if (isNaN(v) || ![1,3,6,9,12].includes(v)) {
        addMessage('Veuillez choisir une durée valide : 1, 3, 6, 9 ou 12 mois.', 'bot');
        valid = false;
      } else {
        devisFields[key] = v;
      }
    } else if (key === 'valeur') {
      const v = parseInt(msg.replace(/\s/g, ''));
      if (isNaN(v) || v < 100000) {
        addMessage('Veuillez entrer une valeur de véhicule valide (minimum 100 000 DA).', 'bot');
        valid = false;
      } else {
        devisFields[key] = v;
      }
    } else if (key === 'age') {
      const v = parseInt(msg);
      if (isNaN(v) || v < 16 || v > 99) {
        addMessage('Veuillez entrer un âge valide (entre 16 et 99 ans).', 'bot');
        valid = false;
      } else {
        devisFields[key] = v;
      }
    } else if (key === 'puissance') {
      const v = parseInt(msg);
      if (isNaN(v) || v < 3 || v > 15) {
        addMessage('Veuillez entrer une puissance fiscale valide (entre 3 et 15 CV).', 'bot');
        valid = false;
      } else {
        devisFields[key] = v;
      }
    } else if (key === 'usage') {
      const v = msg.toLowerCase();
      if (!['personnel', 'professionnel'].includes(v)) {
        addMessage('Veuillez répondre "personnel" ou "professionnel".', 'bot');
        valid = false;
      } else {
        devisFields[key] = v;
      }
    } else {
      devisFields[key] = msg.toLowerCase();
    }
    if (!valid) {
      setTimeout(() => addMessage(AUTO_QUESTIONS[collecteStep].q, 'bot'), 200);
      return;
    }
    isProcessing = true;
    document.getElementById('sendBtn').disabled = true;
    document.querySelectorAll('#suggestions button').forEach(b => b.disabled = true);
    setTimeout(() => { collecteStep++; askNextAutoQuestion(); isProcessing = false; isCollecting = collecteStep < AUTO_QUESTIONS.length; document.getElementById('sendBtn').disabled = false; document.querySelectorAll('#suggestions button').forEach(b => b.disabled = false); }, 300);
    return;
  }

  isProcessing = true;
  document.getElementById('sendBtn').disabled = true;
  document.querySelectorAll('#suggestions button').forEach(b => b.disabled = true);
  addTyping();

  try {
    const data = await callBackend(msg);
    removeTyping();

    conversationId = data.conversation_id || conversationId;
    const fullText = data.response || '';

    addMessage(fullText, 'bot');

    if (data.devis) {
      addDevisCard(data.devis);
    } else if (data.intent === 'QUOTE_AUTO' && data.step === 'collecte') {
      startAutoCollecte();
    }

    const tiles = extractTilesFromText(fullText);
    if (tiles.length > 0) updateTiles(tiles);

    if (fullText) speakText(fullText, null);

  } catch(err) {
    removeTyping();
    addMessage('Désolé, une erreur de connexion est survenue. Vérifiez que le serveur backend est lancé (uvicorn).', 'bot');
    console.error('Backend error:', err);
  }

  isProcessing = false;
  document.getElementById('sendBtn').disabled = false;
  document.querySelectorAll('#suggestions button').forEach(b => b.disabled = false);
  const inp = document.getElementById('input');
  inp.focus();
  inp.setSelectionRange(inp.value.length, inp.value.length);
}

// ══════════════════════════════════════════════
//  COLLECTE DEVIS AUTO
// ══════════════════════════════════════════════
const AUTO_QUESTIONS = [
  { key: 'valeur',    q: 'Quelle est la valeur de votre véhicule (en DA) ?' },
  { key: 'puissance', q: 'Quelle est la puissance fiscale (CV) ?' },
  { key: 'usage',     q: "Quel est l'usage du véhicule ? (personnel / professionnel)" },
  { key: 'garanties', q: 'Quelles garanties souhaitez-vous ? (RC, VOL, VIV, BDG, etc. — séparées par virgule)' },
  { key: 'duree_mois',q: 'Pour quelle durée ? (1, 3, 6, 9 ou 12 mois)' },
  { key: 'age',       q: 'Quel est votre âge ?' },
];

let collecteStep = 0;

function startAutoCollecte() {
  collecteStep = 0;
  devisFields = {};
  isCollecting = true;
  askNextAutoQuestion();
}

function askNextAutoQuestion() {
  if (collecteStep >= AUTO_QUESTIONS.length) {
    doDevisAuto();
    return;
  }
  const q = AUTO_QUESTIONS[collecteStep];
  addMessage(q.q, 'bot');
}

async function doDevisAuto() {
  addTyping();
  try {
    const result = await callDevis(devisFields);
    removeTyping();
    if (result.devis) {
      result.devis.fields = devisFields;
      addDevisCard(result.devis);
      addMessage("Voici votre devis ! Vous pouvez le sauvegarder avec le bouton 💾 ci-dessus, ou faire une autre simulation.", 'bot');
    } else {
      addMessage("Je n'ai pas pu calculer le devis. Vérifions les informations.", 'bot');
    }
  } catch (err) {
    removeTyping();
    addMessage('Erreur lors du calcul du devis.', 'bot');
  }
}

// ══════════════════════════════════════════════
//  RESET CONVERSATION
// ══════════════════════════════════════════════
function resetConv() {
  conversationId = '';
  devisFields = {};
  collecteStep = 0;
  isCollecting = false;
  document.getElementById('chat').innerHTML       = '';
  document.getElementById('tilesBar').innerHTML   = '';
  addMessage('Bienvenue sur <strong>AssurDevis</strong> ! En quoi puis-je vous aider ?', 'bot', true);
}

// ══════════════════════════════════════════════
//  SCAN & ANALYSE CONTRAT
// ══════════════════════════════════════════════
function triggerScan() {
  closeScanModal();
  document.getElementById('fileInput').click();
}

function triggerScanOptions() {
  document.getElementById('scanModal').style.display = 'flex';
}

function closeScanModal() {
  document.getElementById('scanModal').style.display = 'none';
}

function triggerFileUpload() {
  closeScanModal();
  document.getElementById('fileInput').click();
}

async function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';
  uploadAndAnalyse(file);
}

async function uploadAndAnalyse(file) {
  addTyping();
  addMessage(`📄 Analyse du contrat en cours : ${file.name}`, 'user');
  try {
    const data = await callAnalyse(file);
    removeTyping();
    if (data.error) {
      addMessage('❌ ' + data.error, 'bot');
      return;
    }
    if (data.resultat && data.resultat.error) {
      addMessage('❌ ' + data.resultat.error, 'bot');
      if (data.resultat.raw) addMessage(data.resultat.raw.substring(0, 500), 'bot');
      return;
    }
    if (data.texte_extrait) {
      addMessage('📄 Texte extrait (mode dégradé) :<br/><pre style="font-size:11px;max-height:200px;overflow:auto">' + data.texte_extrait.substring(0, 1000) + '</pre>', 'bot', true);
      addMessage('💡 Activez Ollama pour l\'analyse complète.', 'bot');
      return;
    }
    if (data.resultat) {
      addAnalyseCard(data.resultat);
      addMessage('Souhaitez-vous faire une autre analyse ou revenir au devis ?', 'bot');
    }
  } catch (err) {
    removeTyping();
    addMessage('❌ Erreur de connexion au serveur. Vérifiez que le backend est lancé.', 'bot');
  }
}

function addAnalyseCard(r) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'analyse-card';
  const reconnu = r.reconnu;
  const score = r.score_similarite || 0;
  const typeContrat = r.type_contrat || 'Inconnu';

  let garantiesHtml = '';
  if (r.garanties && r.garanties.length) {
    garantiesHtml = '<div class="analyse-section"><div class="analyse-section-title">✅ Garanties</div>' +
      r.garanties.map(g => `<span class="analyse-tag garantie">${g}</span>`).join('') + '</div>';
  }

  let exclusionsHtml = '';
  if (r.exclusions && r.exclusions.length) {
    exclusionsHtml = '<div class="analyse-section"><div class="analyse-section-title">❌ Exclusions</div>' +
      r.exclusions.map(e => `<span class="analyse-tag exclusion">${e}</span>`).join('') + '</div>';
  }

  let clausesHtml = '';
  if (r.clauses_importantes && r.clauses_importantes.length) {
    clausesHtml = '<div class="analyse-section"><div class="analyse-section-title">⚠️ Clauses importantes</div>' +
      r.clauses_importantes.map(c => `<div class="analyse-clause">${c}</div>`).join('') + '</div>';
  }

  let primesHtml = '';
  if (r.prime_annuelle_ht) {
    primesHtml = '<div class="analyse-section"><div class="analyse-section-title">💰 Prime annuelle HT</div><div style="font-size:18px;font-weight:700;">' +
      r.prime_annuelle_ht.toLocaleString() + ' DA</div></div>';
  }

  let franchisesHtml = '';
  if (r.franchises && Object.keys(r.franchises).length) {
    franchisesHtml = '<div class="analyse-section"><div class="analyse-section-title">🔍 Franchises</div>' +
      Object.entries(r.franchises).map(([k, v]) => `<div style="font-size:12px;">${k}: ${v ?? 'N/A'}</div>`).join('') + '</div>';
  }

  div.innerHTML = `
    <h4>📄 ${reconnu ? '✅ Contrat reconnu' : '❌ Contrat non reconnu'}</h4>
    <div style="display:flex;justify-content:space-between;align-items:center;margin:6px 0;">
      <span style="font-weight:600;">${typeContrat}</span>
      <span class="analyse-score ${reconnu ? 'valid' : 'invalid'}">${score}%</span>
    </div>
    <div style="height:6px;background:var(--cream-dark);border-radius:100px;margin-bottom:10px;overflow:hidden;">
      <div style="height:100%;width:${score}%;background:${reconnu ? 'var(--green-400)' : 'var(--bdx-400)'};border-radius:100px;transition:width .5s;"></div>
    </div>
    ${garantiesHtml}
    ${exclusionsHtml}
    ${primesHtml}
    ${franchisesHtml}
    ${clausesHtml}
    ${r.resume_client ? '<div class="analyse-section"><div class="analyse-section-title">📝 Résumé</div><div style="font-size:12px;line-height:1.5;">' + r.resume_client + '</div></div>' : ''}
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// ══════════════════════════════════════════════
//  SCORING & RATING
// ══════════════════════════════════════════════

async function calculateScore(devisData) {
  try {
    const resp = await fetch(`${API_BASE}/scoring/devis`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: JSON.stringify(devisData), conversation_id: '' }),
    });
    const data = await resp.json();
    return data.score || null;
  } catch(e) {
    return null;
  }
}

let ratingInFlight = false;

async function rateDevis(devisId, stars) {
  if (ratingInFlight || !devisId) return;
  const container = document.getElementById(`rating_${devisId}`);
  if (!container) return;
  const starEls = container.querySelectorAll('.star');
  starEls.forEach(el => {
    el.onclick = null;
    el.classList.add('readonly');
    el.textContent = parseInt(el.dataset.stars) <= stars ? '★' : '☆';
  });
  ratingInFlight = true;
  try {
    const resp = await fetch(`${API_BASE}/rating`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: JSON.stringify({ devis_id: devisId, stars }), conversation_id: '' }),
    });
    const data = await resp.json();
    if (data.stats) {
      const label = container.querySelector('.avg-label');
      label.innerHTML = `⭐ ${data.stats.average}/5 <span style="font-size:11px;color:var(--text-soft)">(${data.stats.count} avis)</span>`;
    }
  } catch(e) {
    starEls.forEach(el => { el.onclick = null; });
  }
  ratingInFlight = false;
}

async function refreshRatingDisplay(devisId) {
  try {
    const resp = await fetch(`${API_BASE}/rating/stats`);
    const data = await resp.json();
    if (data.stats && data.stats.count > 0) {
      const label = document.querySelector(`#rating_${devisId} .avg-label`);
      if (label) label.innerHTML = `⭐ ${data.stats.average}/5 <span style="font-size:11px;color:var(--text-soft)">(${data.stats.count} avis)</span>`;
    }
  } catch(e) {}
}

initConversation();
